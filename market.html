<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السوق - PiXchange</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f6f3fa;
margin:0;
padding:20px;
}

header{
background:#5d2d91;
color:white;
padding:18px;
border-radius:12px;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.offer{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #eee;
}

button{
background:#6b2db5;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
font-size:15px;
}

.price{
font-size:22px;
font-weight:bold;
color:#6b2db5;
}
</style>

</head>

<body>

<header>

<h2>سوق PiXchange</h2>

<p>نماذج عروض شبكة الاختبار</p>

</header>

<div class="card">

<h3>أفضل العروض</h3>

<div class="offer">
<div>
<strong>شراء Pi</strong><br>
<span class="price">0.72 USD</span>
</div>

<button>بيع</button>

</div>

<div class="offer">
<div>
<strong>شراء Pi</strong><br>
<span class="price">0.75 USD</span>
</div>

<button>بيع</button>

</div>

<div class="offer">
<div>
<strong>شراء Pi</strong><br>
<span class="price">0.80 USD</span>
</div>

<button>بيع</button>

</div>

</div>

<div class="card">

<h3>إضافة عرض</h3>

<button style="width:100%">
إنشاء عرض جديد
</button>

</div>

</body>
</html>
